[Emulator]
Type = 1 # 1: CHIP-8, 2: SCHIP-1.1, 3: SCHIP Modern, 4: XO-Chip
FileROM = "../resources/default.ch8"
BeepSound = "../resources/sounds/beep.wav"
InstructionsPerSecond = 700

[Window]
PixelSize = 10
OffColor = [0, 0, 0]
OnColor = [255, 255, 255] # Note: For XO-CHIP, OnColor is used when pixel are On for plane 1 and plane 2
Plane1Color = [255, 255, 0]
Plane2Color = [0, 255, 255]
